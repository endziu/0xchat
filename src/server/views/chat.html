<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ETH-Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script nonce="__CSP_NONCE__">window.WC_PROJECT_ID = '__WC_PROJECT_ID__';</script>
<style>
:root {
  --bg: #0a0a0c;
  --surface: #111115;
  --border: #1e1e26;
  --text: #e8e6e1;
  --dim: #6b6a72;
  --accent: #c4f84a;
  --red: #ff4444;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

.app {
  display: flex;
  height: 100vh;
  max-width: 1200px;
  margin: 0 auto;
}

/* --- Header Bar --- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-style: italic;
  text-decoration: none;
  color: var(--text);
}
.logo span { color: var(--accent); }

.wallet-area {
  display: none;
  align-items: center;
  gap: 12px;
  font-size: 0.8rem;
}

.my-addr {
  color: var(--dim);
  font-size: 0.78rem;
}

.disconnect-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.disconnect-btn:hover { color: var(--red); border-color: var(--red); }

/* --- Sidebar --- */
.sidebar {
  width: 260px;
  min-width: 260px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--dim);
}

.new-chat-btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 4px 10px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
}
.new-chat-btn:hover { background: var(--accent); color: var(--bg); }

.conv-list {
  flex: 1;
  overflow-y: auto;
}

.conv-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.conv-item:hover { background: var(--surface); }
.conv-item.active { background: var(--surface); border-left: 2px solid var(--accent); }

.conv-addr {
  font-size: 0.82rem;
  color: var(--text);
}
.conv-time {
  font-size: 0.7rem;
  color: var(--dim);
}

/* --- Chat Area --- */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.back-btn {
  display: none;
  font-family: var(--mono);
  font-size: 0.85rem;
  background: transparent;
  border: none;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
}

.chat-with {
  font-size: 0.85rem;
  color: var(--text);
}

.chat-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-size: 0.85rem;
}

.chat-pane {
  flex: 1;
  display: none;
  flex-direction: column;
  min-height: 0;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  max-width: 70%;
  padding: 10px 14px;
  font-size: 0.85rem;
  line-height: 1.5;
  transition: opacity 5s ease-out;
}

.msg.fading { opacity: 0; }

.msg-mine {
  align-self: flex-end;
  background: var(--accent);
  color: var(--bg);
}

.msg-theirs {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}

.msg-error {
  align-self: center;
  color: var(--red);
  font-size: 0.78rem;
  font-style: italic;
}

.msg-meta {
  display: flex;
  gap: 8px;
  margin-top: 4px;
  font-size: 0.68rem;
  opacity: 0.6;
}

.msg-mine .msg-meta { justify-content: flex-end; }

/* --- Input Area --- */
.input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}

.msg-input {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 10px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  outline: none;
  resize: none;
}
.msg-input:focus { border-color: var(--accent); }
.msg-input::placeholder { color: var(--dim); }

.ttl-select {
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 10px 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--dim);
  cursor: pointer;
  outline: none;
}
.ttl-select:focus { border-color: var(--accent); }

.send-btn {
  font-family: var(--mono);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 10px 20px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.send-btn:hover { background: var(--accent); color: var(--bg); }

.status {
  font-size: 0.78rem;
  color: var(--dim);
  padding: 0 20px 10px;
  min-height: 18px;
}
.status.error { color: var(--red); }
.status.success { color: var(--accent); }

#connectPrompt {
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: flex-start;
  color: var(--dim);
  font-size: 0.85rem;
}
#connectPrompt button {
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 0.4rem 0.9rem;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  letter-spacing: 0.04em;
}
#registerBanner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1.2rem;
  border-left: 3px solid var(--red, #e55);
  background: var(--surface);
  font-size: 0.8rem;
  color: var(--dim);
  gap: 1rem;
}
#registerBanner a { color: var(--accent); }
[hidden] { display: none !important; }

/* --- Mobile --- */
@media (max-width: 640px) {
  .sidebar {
    width: 100%;
    min-width: 100%;
  }
  .sidebar.hidden { display: none; }

  .chat-area { display: none; }
  .chat-area.mobile-active { display: flex; }

  .back-btn { display: block; }

  .msg { max-width: 85%; }

  .header { padding: 12px 16px; }
  .logo { font-size: 1.2rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="header">
      <a class="logo" href="/chat"><span>&#x2B21;</span> eth-chat</a>
      <div class="wallet-area" id="walletArea">
        <span class="my-addr" id="myAddr"></span>
        <button class="disconnect-btn" id="disconnectBtn">x</button>
      </div>
    </div>
    <div class="sidebar-header">
      <span class="sidebar-title">Conversations</span>
      <button class="new-chat-btn" id="newChatBtn">+ new</button>
    </div>
    <div id="connectPrompt" hidden>
      <p>Connect your wallet to start chatting.</p>
      <button id="connectBtn">Connect Wallet</button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div id="registerBanner" hidden>
      <span>Register your encryption key to send and receive messages.</span>
      <a href="/register">Register now →</a>
    </div>
    <div class="chat-header">
      <button class="back-btn" id="backBtn">&larr;</button>
      <span class="chat-with" id="chatWith"></span>
    </div>
    <div class="chat-empty" id="chatEmpty">
      Select a conversation or start a new one
    </div>
    <div class="chat-pane" id="chatPane">
      <div class="messages" id="messages"></div>
      <div class="status" id="status"></div>
      <div class="input-area">
        <input type="text" class="msg-input" id="msgInput"
          placeholder="Type a message..." autocomplete="off">
        <select class="ttl-select" id="ttlSelect">
          <option value="30">30s</option>
          <option value="300" selected>5m</option>
          <option value="3600">1h</option>
          <option value="86400">24h</option>
        </select>
        <button class="send-btn" id="sendBtn">send</button>
      </div>
    </div>
  </div>
</div>

<script nonce="__CSP_NONCE__" src="/utils.js"></script>
<script nonce="__CSP_NONCE__" src="/chat-crypto.js"></script>
<script nonce="__CSP_NONCE__" src="/chat-session.js"></script>
<script nonce="__CSP_NONCE__" src="/chat-client.js"></script>
</body>
</html>
